<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tablet OS</title>

<style>
html,body{
margin:0;padding:0;width:100%;height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:black;
}

/* WALLPAPER */
.wall{
position:fixed;inset:0;
background:url("https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=2200&q=80")
center/cover no-repeat;
transform:scale(1.05);
}

.glass{
position:fixed;inset:0;
backdrop-filter: blur(22px);
background:rgba(0,0,0,.25);
}

/* TOP WIDGETS */
.top{
position:absolute;top:14px;left:14px;
display:flex;gap:10px;
z-index:50;
}

.widget{
padding:8px 10px;
border-radius:14px;
background:rgba(255,255,255,.14);
backdrop-filter: blur(18px);
color:white;
font-size:12px;
}

/* HOME GRID */
#home{
position:absolute;
inset:0;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
padding:90px 40px 120px;
align-content:center;
}

/* ICON */
.app{
width:82px;height:82px;
border-radius:22px;
background:rgba(255,255,255,.16);
backdrop-filter: blur(18px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
cursor:pointer;
transition:.2s;
user-select:none;
position:relative;
}

.app:active{transform:scale(.92);}

.icon{font-size:28px}
.label{font-size:11px;margin-top:4px;opacity:.9}

/* DOCK */
.dock{
position:absolute;
bottom:16px;
left:50%;
transform:translateX(-50%);
height:88px;
padding:10px 14px;
border-radius:28px;
background:rgba(255,255,255,.12);
backdrop-filter: blur(25px);
display:flex;
gap:14px;
align-items:center;
}

.dock .app{
width:64px;height:64px;
}

/* "Dynamic Island" blocker simulation */
.island{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:160px;
height:32px;
border-radius:0 0 18px 18px;
background:rgba(0,0,0,.7);
backdrop-filter: blur(20px);
z-index:100;
}

/* APP WINDOW */
.window{
position:absolute;
inset:40px;
border-radius:18px;
background:rgba(20,20,20,.9);
backdrop-filter: blur(25px);
display:none;
color:white;
overflow:hidden;
box-shadow:0 20px 80px rgba(0,0,0,.6);
}

.window.active{display:block;animation:pop .25s ease;}

@keyframes pop{
from{transform:scale(.85);opacity:0}
to{transform:scale(1);opacity:1}
}

.bar{
height:44px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 12px;
background:rgba(255,255,255,.08);
cursor:grab;
}

.content{
padding:20px;
}

/* SHORTCUTS */
.shortcuts{
position:absolute;
right:14px;
top:120px;
display:flex;
flex-direction:column;
gap:10px;
}

.short{
padding:10px 12px;
border-radius:14px;
background:rgba(255,255,255,.14);
backdrop-filter: blur(18px);
color:white;
font-size:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="wall"></div>
<div class="glass"></div>

<div class="island"></div>

<!-- widgets -->
<div class="top">
<div class="widget" id="clock">⏰ --:--</div>
<div class="widget" id="weather">🌤️ ...</div>
<div class="widget" id="battery">🔋 ...</div>
</div>

<!-- shortcuts -->
<div class="shortcuts">
<div class="short" onclick="shortcut('Energia')">⚡ Energia</div>
<div class="short" onclick="shortcut('Noc')">🌙 Noc</div>
<div class="short" onclick="shortcut('LED')">💡 LED</div>
<div class="short" onclick="shortcut('YouTube')">▶ YouTube</div>
</div>

<!-- HOME -->
<div id="home">

<div class="app" onclick="openApp('Safari')"><div class="icon">🌐</div><div class="label">Safari</div></div>
<div class="app" onclick="openApp('Wiadomości')"><div class="icon">💬</div><div class="label">Messages</div></div>
<div class="app" onclick="openApp('Telefon')"><div class="icon">📞</div><div class="label">Phone</div></div>
<div class="app" onclick="openApp('Zegar')"><div class="icon">⏰</div><div class="label">Clock</div></div>

<div class="app"><div class="icon">🖼️</div><div class="label">Photos</div></div>
<div class="app"><div class="icon">📁</div><div class="label">Files</div></div>
<div class="app"><div class="icon">⚙️</div><div class="label">Settings</div></div>
<div class="app"><div class="icon">🗺️</div><div class="label">Maps</div></div>

</div>

<!-- dock -->
<div class="dock">
<div class="app">💬</div>
<div class="app">📞</div>
<div class="app">⏰</div>
<div class="app">⚡</div>
<div class="app">🌙</div>
</div>

<!-- window -->
<div class="window" id="win">
<div class="bar">
<span id="title">App</span>
<button onclick="closeApp()">✕</button>
</div>
<div class="content">Aplikacja działa</div>
</div>

<script>

/* CLOCK */
setInterval(()=>{
const d=new Date();
document.getElementById("clock").innerText="⏰ "+d.toLocaleTimeString().slice(0,5);
},1000);

/* WEATHER */
fetch("https://api.open-meteo.com/v1/forecast?latitude=50.26&longitude=19.02&current_weather=true")
.then(r=>r.json())
.then(d=>{
document.getElementById("weather").innerText="🌤️ "+d.current_weather.temperature+"°C";
});

/* BATTERY */
if(navigator.getBattery){
navigator.getBattery().then(b=>{
const u=()=>{
document.getElementById("battery").innerText="🔋 "+Math.round(b.level*100)+"%";
};
u(); b.addEventListener("levelchange",u);
});
}

/* APP OPEN */
function openApp(name){
document.getElementById("win").style.display="block";
document.getElementById("title").innerText=name;
}

/* CLOSE */
function closeApp(){
document.getElementById("win").style.display="none";
}

/* SHORTCUTS */
function shortcut(name){
alert("Skrót: "+name);
}

/* AUTO SAFE AREA SHIFT (island protection) */
function adjust(){
let island=document.querySelector(".island");
let h=island.offsetHeight;
document.getElementById("home").style.paddingTop=(80+h)+"px";
}
adjust();

</script>

</body>
</html>
