<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Ultra Dashboard</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 14px 18px;
  font-size: 14px;
  opacity: 0.85;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  flex-direction: row;
  gap: 18px;
  padding: 14px;
  height: calc(100vh - 110px);
  overflow-x: auto;
}

/* PANELE */
.panel {
  min-width: 340px;
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
  padding: 16px;
  backdrop-filter: blur(16px);
}

h3 {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 12px;
}

/* APLIKACJE */
.app {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  text-decoration: none;
  color: white;
  transition: 0.2s;
}

.app:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.15);
}

/* 🔥 DUŻE IKONY */
.app img {
  width: 70px;
  height: 70px;
  border-radius: 16px;
  object-fit: cover;
}

/* DOCK */
.dock {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  padding: 12px 18px;
  background: rgba(255,255,255,0.08);
  border-radius: 22px;
  backdrop-filter: blur(20px);
}

.dock img {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  transition: 0.2s;
}

.dock img:hover {
  transform: scale(1.25);
}

/* LANDSCAPE INFO */
@media (orientation: portrait) {
  body::before {
    content: "Obróć telefon ↻";
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 999;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div> Ultra Dashboard</div>
  <div id="clock"></div>
</div>

<div class="dashboard">

  <div class="panel">
    <h3>System</h3>
    <a class="app" href="https://icloud.com">
      <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png">
      iCloud
    </a>
    <a class="app" href="https://apple.com">
      <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
      Apple
    </a>
  </div>

  <div class="panel">
    <h3>Social</h3>
    <a class="app" href="https://instagram.com">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
      Instagram
    </a>
    <a class="app" href="https://tiktok.com">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
      TikTok
    </a>
  </div>

  <div class="panel">
    <h3>AI</h3>
    <a class="app" href="https://chat.openai.com">
      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
      ChatGPT
    </a>
  </div>

  <div class="panel">
    <h3>Finder</h3>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
      Pliki
    </div>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/1829/1829586.png">
      Zdjęcia
    </div>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png">
      Dokumenty
    </div>
  </div>

</div>

<div class="dock">
  <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
  <img src="https://cdn-icons-png.flaticon.com/512/5968/5968523.png">
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
