<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Ultra OS Dashboard</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden;
  color: white;
}

/* 🌄 TAPETA */
.wallpaper {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, #6366f1, #0f172a, #020617);
  z-index: -2;
}

/* 🌫️ BLUR LAYER (portrait frost) */
.blur-layer {
  position: fixed;
  inset: 0;
  backdrop-filter: blur(0px);
  transition: 0.5s ease;
  z-index: -1;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 14px 18px;
  font-size: 14px;
  opacity: 0.85;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  flex-direction: row;
  gap: 18px;
  padding: 14px;
  height: calc(100vh - 120px);
  overflow-x: auto;
}

/* PANEL */
.panel {
  min-width: 340px;
  background: rgba(255,255,255,0.07);
  border-radius: 22px;
  padding: 16px;
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.08);
  animation: pop 0.4s ease;
}

@keyframes pop {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

h3 {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 12px;
}

/* APP ICONS */
.app {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  transition: 0.2s;
}

.app:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.15);
}

.app img {
  width: 62px;
  height: 62px;
  border-radius: 16px;
  transition: 0.2s;
}

.app img:active {
  transform: scale(0.9);
}

/* DOCK */
.dock {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  padding: 12px 18px;
  background: rgba(255,255,255,0.10);
  border-radius: 24px;
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.08);
}

.dock a {
  text-decoration: none;
}

.dock img {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  transition: 0.25s;
}

.dock img:hover {
  transform: scale(1.7) translateY(-6px);
}

/* 📱 PORTRAIT = FROSTED GLASS */
@media (orientation: portrait) {
  .blur-layer {
    backdrop-filter: blur(18px);
  }

  body::before {
    content: "Obróć urządzenie ↻";
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    background: rgba(0,0,0,0.35);
    z-index: 999;
  }
}
</style>
</head>

<body>

<div class="wallpaper"></div>
<div class="blur-layer"></div>

<div class="topbar">
  <div> Ultra OS</div>
  <div id="clock"></div>
</div>

<div class="dashboard">

  <div class="panel">
    <h3>System</h3>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png">
      iCloud
    </div>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
      Apple
    </div>
  </div>

  <div class="panel">
    <h3>AI</h3>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
      ChatGPT
    </div>
  </div>

</div>

<!-- 🔥 DOCK -->
<div class="dock">

  <a href="tel:">
    <img src="https://cdn-icons-png.flaticon.com/512/724/724664.png" title="Połączenia">
  </a>

  <a href="sms:">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" title="Wiadomości">
  </a>

  <a href="https://time.is" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/992/992700.png" title="Zegar">
  </a>

  <a href="https://music.youtube.com" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" title="YouTube Music">
  </a>

  <a href="https://brave.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Brave_logo.svg/512px-Brave_logo.svg.png" title="Brave">
  </a>

  <a href="#" onclick="alert('NOC MODE')">
    <img src="https://cdn-icons-png.flaticon.com/512/1164/1164954.png" title="Noc">
  </a>

  <a href="#" onclick="document.body.style.filter='brightness(2)'">
    <img src="https://cdn-icons-png.flaticon.com/512/702/702814.png" title="LED">
  </a>

  <a href="#" onclick="document.body.style.filter='hue-rotate(120deg)'">
    <img src="https://cdn-icons-png.flaticon.com/512/1146/1146869.png" title="Energia">
  </a>

</div>

<script>
function clock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(clock,1000);
clock();
</script>

</body>
</html>
