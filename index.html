<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>iPadOS ULTRA</title>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:black;
}

/* ===== WALL ===== */
.wall {
    position:fixed;
    inset:0;
    background:url("https://images.unsplash.com/photo-1520975922203-b6d1c8f2f0b2?auto=format&fit=crop&w=2200&q=80")
    center/cover no-repeat;
    transform:scale(1.05);
}

.blur {
    position:fixed;
    inset:0;
    backdrop-filter: blur(22px);
    background:rgba(0,0,0,0.25);
}

/* ===== TOP WIDGETS ===== */
.widgets {
    position:absolute;
    top:16px;
    left:16px;
    display:flex;
    gap:10px;
    z-index:50;
}

.widget {
    padding:8px 10px;
    border-radius:14px;
    background:rgba(255,255,255,0.14);
    backdrop-filter: blur(20px);
    color:white;
    font-size:12px;
}

/* ===== SPRINGBOARD ===== */
#home {
    position:absolute;
    inset:0;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
    padding:80px 40px 120px;
    align-content:center;
}

.app {
    width:82px;
    height:82px;
    border-radius:22px;
    background:rgba(255,255,255,0.14);
    backdrop-filter: blur(18px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    cursor:pointer;
    user-select:none;
    transition:.2s;
}

.app:active { transform:scale(.92); }

.icon { font-size:30px; }
.label { font-size:11px; margin-top:3px; opacity:.9; }

/* ===== DOCK ===== */
.dock {
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    height:88px;
    padding:10px 16px;
    border-radius:28px;
    background:rgba(255,255,255,0.12);
    backdrop-filter: blur(25px);
    display:flex;
    align-items:center;
    gap:14px;
}

.dock .app {
    width:64px;
    height:64px;
}

.dock .app:hover {
    transform:scale(1.35);
}

/* ===== WINDOWS (Stage Manager) ===== */
.window {
    position:absolute;
    width:420px;
    height:300px;
    border-radius:18px;
    background:rgba(20,20,20,0.85);
    backdrop-filter: blur(25px);
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    display:none;
    flex-direction:column;
    overflow:hidden;
}

.window.active {
    display:flex;
    animation:pop .2s ease;
}

@keyframes pop {
    from { transform:scale(.9); opacity:0; }
    to { transform:scale(1); opacity:1; }
}

.titlebar {
    height:38px;
    background:rgba(255,255,255,0.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 10px;
    cursor:grab;
}

.content {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* resize handle */
.resize {
    position:absolute;
    right:0;
    bottom:0;
    width:18px;
    height:18px;
    cursor:nwse-resize;
}

/* ===== SPOTLIGHT ===== */
#spot {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    padding:14px;
    border-radius:16px;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    display:none;
    color:white;
}

/* folder */
.folder {
    width:90px;
    height:90px;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<div class="wall"></div>
<div class="blur"></div>

<!-- widgets -->
<div class="widgets">
    <div class="widget" id="clock">⏰ --:--</div>
    <div class="widget" id="weather">🌤️ ...</div>
    <div class="widget" id="battery">🔋 ...</div>
    <div class="widget" id="cal">📅 ...</div>
</div>

<!-- HOME -->
<div id="home">

    <div class="app" onclick="openWin('Safari')"><div class="icon">🌐</div><div class="label">Safari</div></div>
    <div class="app" onclick="openWin('Messages')"><div class="icon">💬</div></div>
    <div class="app" onclick="openWin('Music')"><div class="icon">🎵</div></div>
    <div class="app" onclick="openWin('Photos')"><div class="icon">🖼️</div></div>
    <div class="app" onclick="openWin('Maps')"><div class="icon">🗺️</div></div>
    <div class="app" onclick="openWin('Files')"><div class="icon">📁</div></div>
    <div class="app" onclick="openWin('Settings')"><div class="icon">⚙️</div></div>

</div>

<!-- DOCK -->
<div class="dock">
    <div class="app">🌐</div>
    <div class="app">💬</div>
    <div class="app">🎵</div>
    <div class="app">📁</div>
</div>

<!-- WINDOW -->
<div class="window" id="win">
    <div class="titlebar" id="bar">
        <span id="title">App</span>
        <button onclick="closeWin()">✕</button>
    </div>
    <div class="content">Aplikacja działa</div>
    <div class="resize"></div>
</div>

<!-- spotlight -->
<input id="spot" placeholder="Szukaj..." />

<script>

/* ===== CLOCK ===== */
setInterval(()=>{
const d=new Date();
document.getElementById("clock").innerText="⏰ "+d.toLocaleTimeString().slice(0,5);
},1000);

/* ===== CALENDAR ===== */
const d=new Date();
document.getElementById("cal").innerText="📅 "+d.getDate()+"."+(d.getMonth()+1);

/* ===== BATTERY ===== */
if(navigator.getBattery){
navigator.getBattery().then(b=>{
const u=()=>{
document.getElementById("battery").innerText="🔋 "+Math.round(b.level*100)+"%";
};
u(); b.addEventListener("levelchange",u);
});
}

/* ===== WEATHER ===== */
fetch("https://api.open-meteo.com/v1/forecast?latitude=50.26&longitude=19.02&current_weather=true")
.then(r=>r.json()).then(d=>{
document.getElementById("weather").innerText="🌤️ "+d.current_weather.temperature+"°C";
});

/* ===== WINDOWS ===== */
let win=document.getElementById("win");
let bar=document.getElementById("bar");
let dragging=false,dx=0,dy=0;

function openWin(name){
win.style.left="50px";
win.style.top="80px";
win.classList.add("active");
document.getElementById("title").innerText=name;
}

function closeWin(){
win.classList.remove("active");
}

/* drag window */
bar.addEventListener("mousedown",e=>{
dragging=true;
dx=e.offsetX;
dy=e.offsetY;
});

document.addEventListener("mousemove",e=>{
if(dragging){
win.style.left=(e.pageX-dx)+"px";
win.style.top=(e.pageY-dy)+"px";
}
});

document.addEventListener("mouseup",()=>dragging=false);

/* resize */
let res=document.querySelector(".resize");
let resizing=false;

res.addEventListener("mousedown",()=>resizing=true);

document.addEventListener("mousemove",e=>{
if(resizing){
win.style.width=e.pageX-win.offsetLeft+"px";
win.style.height=e.pageY-win.offsetTop+"px";
}
});

document.addEventListener("mouseup",()=>resizing=false);

/* SPOTLIGHT */
document.addEventListener("keydown",e=>{
if(e.key===" "){
let s=document.getElementById("spot");
s.style.display="block";
s.focus();
}
});
</script>

</body>
</html>
