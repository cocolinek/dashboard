<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Ultra Dashboard PRO</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 14px 18px;
  font-size: 14px;
  opacity: 0.85;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  flex-direction: row;
  gap: 18px;
  padding: 14px;
  height: calc(100vh - 120px);
  overflow-x: auto;
}

/* PANELE */
.panel {
  min-width: 340px;
  background: rgba(255,255,255,0.08);
  border-radius: 22px;
  padding: 16px;
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.08);
}

h3 {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 12px;
}

/* APP */
.app {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  text-decoration: none;
  color: white;
  transition: 0.2s;
}

.app:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.15);
}

.app img {
  width: 60px;
  height: 60px;
  border-radius: 16px;
}

/* DOCK */
.dock {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  padding: 12px 18px;
  background: rgba(255,255,255,0.10);
  border-radius: 24px;
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.08);
}

/* ICONS IN DOCK */
.dock a {
  text-decoration: none;
}

.dock img {
  width: 50px;
  height: 50px;
  border-radius: 14px;
  transition: 0.25s;
}

.dock img:hover {
  transform: scale(1.7);
}

/* LANDSCAPE WARNING */
@media (orientation: portrait) {
  body::before {
    content: "Obróć telefon ↻";
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 999;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div> Ultra System</div>
  <div id="clock"></div>
</div>

<div class="dashboard">

  <div class="panel">
    <h3>System</h3>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png">
      iCloud
    </div>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
      Apple
    </div>
  </div>

  <div class="panel">
    <h3>AI</h3>
    <div class="app">
      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
      ChatGPT
    </div>
  </div>

</div>

<!-- 🔥 NOWY DOCK -->
<div class="dock">

  <!-- POŁĄCZENIA -->
  <a href="tel:" title="Połączenia">
    <img src="https://cdn-icons-png.flaticon.com/512/724/724664.png">
  </a>

  <!-- WIADOMOŚCI -->
  <a href="sms:" title="Wiadomości">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
  </a>

  <!-- ZEGAR -->
  <a href="https://time.is" target="_blank" title="Zegar">
    <img src="https://cdn-icons-png.flaticon.com/512/992/992700.png">
  </a>

  <!-- MUZYKA / YOUTUBE (Brave) -->
  <a href="https://music.youtube.com" target="_blank" title="Muzyka">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
  </a>

  <!-- BRAVE BROWSER -->
  <a href="https://brave.com" target="_blank" title="Brave">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Brave_logo.svg/512px-Brave_logo.svg.png">
  </a>

  <!-- SKRÓT: NOC -->
  <a href="#" onclick="alert('Skrót NOC uruchomiony')" title="Noc">
    <img src="https://cdn-icons-png.flaticon.com/512/1164/1164954.png">
  </a>

  <!-- SKRÓT: LED -->
  <a href="#" onclick="document.body.style.filter='brightness(2)'" title="LED">
    <img src="https://cdn-icons-png.flaticon.com/512/702/702814.png">
  </a>

  <!-- SKRÓT: ENERGIA -->
  <a href="#" onclick="document.body.style.filter='hue-rotate(120deg)'" title="Energia">
    <img src="https://cdn-icons-png.flaticon.com/512/1146/1146869.png">
  </a>

</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
